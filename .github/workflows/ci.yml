name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run scaffold tests
        run: python -m pytest tests/scaffold/ --ignore=tests/scaffold/test_backend_portability.py --ignore=tests/scaffold/test_openai_format_compatibility.py -v

      - name: Smoke test imports
        run: python -c "from fidelis.scaffold import wrap_system_prompt, preflight; from fidelis.augment import augment; from fidelis import init_cmd, watch_cmd, mcp_cmd, mcp_server; print('imports ok')"
